name: CI

on:
  push:
    branches: [main, master, develop, "release/**", "claude/**"]
    paths-ignore:
      - "**.md"
      - ".github/workflows/branch-protection.yml"
      - ".github/workflows/railway-deploy-guard.yml"
  pull_request:
    # No branch filter — CI runs on ALL pull requests regardless of base branch.
    # Feature branches targeting claude/* or any intermediate branch are covered.
    paths-ignore:
      - "**.md"
      - ".github/workflows/branch-protection.yml"
      - ".github/workflows/railway-deploy-guard.yml"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  PNPM_VERSION: "10.13.1"
  # Placeholder so any db import that tries to connect fails gracefully;
  # typecheck and build don't execute runtime DB code.
  DATABASE_URL: "postgres://localhost:5432/ci_placeholder"

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

  build:
    name: build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @workspace/castor-orcamento run build

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build
