name: CI

on:
  push:
    branches:
      - main
      - master
      - develop
      - "release/**"
      - "claude/**"
    paths-ignore:
      - "**.md"
      - ".github/workflows/branch-protection.yml"
      - ".github/workflows/railway-deploy-guard.yml"
  pull_request:
    paths-ignore:
      - "**.md"
      - ".github/workflows/branch-protection.yml"
      - ".github/workflows/railway-deploy-guard.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck:
    name: typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: pnpm run typecheck

  build:
    name: build
    runs-on: ubuntu-latest
    needs: typecheck
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        run: pnpm --filter @workspace/castor-orcamento run build

      - name: Build API server
        run: pnpm --filter @workspace/api-server run build
