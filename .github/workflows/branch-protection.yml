name: Branch Protection

# Applies a GitHub Ruleset (IaC) to protect main/master/develop/release/* branches.
# Manual-only — run from the Actions tab when the ruleset definition changes.
#
# Auth: uses GITHUB_TOKEN by default. If the org restricts the default token to
# read-only, set a repo secret named ADMIN_TOKEN (PAT or GitHub App token) with
# the "administration: write" scope. The workflow auto-prefers ADMIN_TOKEN.

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — show payload without applying"
        type: boolean
        default: false

permissions:
  contents: read
  administration: write

jobs:
  apply-ruleset:
    name: Apply Castor SaaS ruleset
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.ADMIN_TOKEN || secrets.GITHUB_TOKEN }}
      REPO: ${{ github.repository }}
      RULESET_NAME: "Castor SaaS - Branch Protection"

    steps:
      - name: Build ruleset payload
        run: |
          cat > /tmp/ruleset.json <<'PAYLOAD'
          {
            "name": "Castor SaaS - Branch Protection",
            "target": "branch",
            "enforcement": "active",
            "conditions": {
              "ref_name": {
                "include": [
                  "refs/heads/main",
                  "refs/heads/master",
                  "refs/heads/develop",
                  "refs/heads/release/**"
                ],
                "exclude": []
              }
            },
            "bypass_actors": [
              {
                "actor_id": 5,
                "actor_type": "RepositoryRole",
                "bypass_mode": "always"
              }
            ],
            "rules": [
              { "type": "deletion" },
              { "type": "non_fast_forward" },
              { "type": "required_linear_history" },
              {
                "type": "pull_request",
                "parameters": {
                  "required_approving_review_count": 1,
                  "dismiss_stale_reviews_on_push": true,
                  "require_code_owner_review": false,
                  "require_last_push_approval": false,
                  "required_review_thread_resolution": false
                }
              },
              {
                "type": "required_status_checks",
                "parameters": {
                  "strict_required_status_checks_policy": true,
                  "required_status_checks": [
                    { "context": "typecheck" },
                    { "context": "build" }
                  ]
                }
              }
            ]
          }
          PAYLOAD

      - name: Dry run - show payload
        if: ${{ inputs.dry_run }}
        run: |
          echo "=== DRY RUN: payload that would be applied ==="
          python3 -m json.tool /tmp/ruleset.json
          echo "No changes were made."

      - name: Verify token has admin scope
        if: ${{ !inputs.dry_run }}
        run: |
          if ! gh api "repos/$REPO" --jq '.permissions.admin' 2>/dev/null | grep -q true; then
            echo "::error::Token lacks admin permission on $REPO. Set ADMIN_TOKEN secret (PAT/App token with administration:write)."
            exit 1
          fi
          echo "Token has admin scope."

      - name: Check for existing ruleset
        if: ${{ !inputs.dry_run }}
        id: existing
        run: |
          ID=$(gh api "repos/$REPO/rulesets" --jq ".[] | select(.name == \"$RULESET_NAME\") | .id" 2>/dev/null | head -1)
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Create ruleset (first time)
        if: ${{ !inputs.dry_run && steps.existing.outputs.id == '' }}
        run: |
          echo "Creating ruleset '$RULESET_NAME'..."
          gh api --method POST "repos/$REPO/rulesets" --input /tmp/ruleset.json | python3 -m json.tool
          echo "Ruleset created."

      - name: Update ruleset (idempotent)
        if: ${{ !inputs.dry_run && steps.existing.outputs.id != '' }}
        run: |
          ID="${{ steps.existing.outputs.id }}"
          echo "Updating ruleset (id: $ID)..."
          gh api --method PUT "repos/$REPO/rulesets/$ID" --input /tmp/ruleset.json | python3 -m json.tool
          echo "Ruleset updated."

      - name: Summary
        if: ${{ !inputs.dry_run }}
        run: |
          {
            echo "## Branch Protection applied"
            echo ""
            echo "| Branch | Protection |"
            echo "|--------|------------|"
            echo "| \`main\` | Active |"
            echo "| \`master\` | Active |"
            echo "| \`develop\` | Active |"
            echo "| \`release/**\` | Active |"
            echo ""
            echo "### Active rules"
            echo "- Direct push blocked"
            echo "- PR required (min. 1 approval)"
            echo "- Required status checks: \`typecheck\`, \`build\`"
            echo "- Linear history required"
            echo "- Force push blocked"
            echo "- Branch deletion blocked"
            echo "- Bypass: repository \`admin\` role"
          } >> "$GITHUB_STEP_SUMMARY"
