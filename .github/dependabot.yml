version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "08:00"
      timezone: America/Sao_Paulo
    open-pull-requests-limit: 5
    target-branch: main
    labels:
      - dependencies
    groups:
      # Group all Radix UI updates together
      radix-ui:
        patterns:
          - "@radix-ui/*"
      # Group all Tanstack updates
      tanstack:
        patterns:
          - "@tanstack/*"
      # Group minor/patch for safe auto-merge candidates
      minor-and-patch:
        update-types:
          - minor
          - patch
    ignore:
      # Replit plugins — only used in dev, low priority
      - dependency-name: "@replit/*"
        update-types: ["version-update:semver-major"]
    reviewers: []
    commit-message:
      prefix: "chore(deps)"

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    labels:
      - dependencies
    commit-message:
      prefix: "chore(ci)"
