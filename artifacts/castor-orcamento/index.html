<!DOCTYPE html>
<html lang="pt-BR" translate="no">
  <head>
    <meta charset="UTF-8" />
    <!-- App React em pt-BR: o tradutor automático do navegador reescreve text
         nodes e corrompe a UI ("Calor"→"Calorias") além de poder quebrar a
         reconciliação do React. notranslate impede isso. -->
    <meta name="google" content="notranslate" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />

    <!-- SEO -->
    <title>Castor Colchões — Loja em Cabo Frio e Araruama | Região dos Lagos</title>
    <meta name="description" content="Colchões Castor com tecnologia suíça. Diagnóstico personalizado do sono, entrega em toda a Região dos Lagos. Lojas em Cabo Frio e Araruama." />
    <link rel="canonical" href="https://lojacastorcabofrio.com.br/" />
    <meta property="og:title" content="Castor Colchões — Cabo Frio e Araruama" />
    <meta property="og:description" content="Colchões Castor com tecnologia suíça. Diagnóstico personalizado do sono, entrega em toda a Região dos Lagos." />
    <meta property="og:image" content="https://lojacastorcabofrio.com.br/opengraph.jpg" />
    <meta property="og:url" content="https://lojacastorcabofrio.com.br/" />
    <meta property="og:type" content="website" />
    <meta property="og:locale" content="pt_BR" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Fonts: preconnect + stylesheet (replaces render-blocking CSS @import) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&family=Outfit:wght@400;500;600;700;800&display=swap" />

    <!-- Preconnect to API backend + external resources -->
    <link rel="preconnect" href="https://evolution-api-production-405f.up.railway.app" />
    <link rel="dns-prefetch" href="https://wa.me" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
